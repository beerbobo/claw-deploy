
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=yes">
<title>那与航优选</title>
<style>/* ============================================
   那与航 · 推品页面 CSS v4 — 三层架构
   设计系统参照：docs/推品页UI重设计-开发交接单.md
   交互原型参照：commerce/ui-demo-v2.html
   ============================================ */

/* -------- Design Tokens -------- */
:root {
  --c-bg: #ffffff;
  --c-surf: #f9fbf7;
  --c-surf-alt: #f5f2ec;
  --c-text: #2c2c2a;
  --c-text-s: #5f5e5a;
  --c-text-h: #8b8680;
  --c-line: #e8e6dc;
  --c-line-h: #d3d1c7;
  --c-brand: #2d5a3d;
  --c-accent: #639922;
  --c-accent-lt: #eaf3de;
  --c-warn: #ba7517;
  --c-warn-lt: #faeeda;
  --c-danger: #a32d2d;
  --c-danger-lt: #fcebeb;
  --c-done: #888780;
  --c-done-lt: #f1efe8;
  --c-new: #185fa5;
  --c-new-lt: #e6f1fb;
  --c-star: #ba7517;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --fs-base: 16px;
  --fs-h1: 22px;
  --fs-h2: 17px;
  --fs-body: 15px;
  --fs-meta: 14px;
  --fs-sm: 13px;
  --sp-card: 16px;
  --sp-sec: 20px;
  --r: 12px;
  --r-sm: 8px;
}

/* -------- Reset -------- */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  font-size: var(--fs-base);
  background: var(--c-surf);
  color: var(--c-text);
  line-height: 1.5;
  max-width: 500px;
  margin: 0 auto;
  min-height: 100dvh;
  -webkit-text-size-adjust: 100%;
}

/* ===== 顶部栏 ===== */
.top-bar {
  background: var(--c-brand);
  color: #fff;
  padding: 18px var(--sp-card);
  position: sticky;
  top: 0;
  z-index: 10;
}
.top-bar h1 { font-size: var(--fs-h1); font-weight: 600; }
.top-bar p { font-size: var(--fs-sm); opacity: 0.8; margin-top: 2px; }
.top-bar .content-entry-card { display:flex; align-items:center; gap:8px; margin-top:10px; padding:8px 12px; background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.2); border-radius:8px; color:#fff; text-decoration:none; font-size:13px; transition:background 0.2s; }
.top-bar .content-entry-card:active { background:rgba(255,255,255,0.2); }
.top-bar .content-entry-icon { font-size:16px; }
.top-bar .content-entry-text { flex:1; }
.top-bar .content-entry-arrow { opacity:0.6; font-size:12px; }

/* ===== 第一层：今日快照 ===== */
.snap {
  margin: var(--sp-sec) var(--sp-card) 0;
  background: #fff;
  border-radius: var(--r);
  border: 0.5px solid var(--c-line);
  overflow: hidden;
}
.snap-row {
  padding: 10px 16px;
  font-size: var(--fs-sm);
  color: var(--c-text-s);
  border-bottom: 0.5px solid var(--c-line);
}
.snap-row:last-child { border-bottom: none; }
.snap-funnel {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.snap-num { font-weight: 700; font-size: var(--fs-body); }
.snap-num.big { font-size: 20px; color: var(--c-brand); }
.snap-arr { color: var(--c-text-h); }
.snap-sub { margin-top: 4px; color: var(--c-text-h); }
.snap-suppliers {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.snap-top3 { font-weight: 500; color: var(--c-text); }

/* ===== 第二层：品类分布 ===== */
.dist {
  margin: 12px var(--sp-card) 0;
  background: #fff;
  border-radius: var(--r);
  border: 0.5px solid var(--c-line);
}
.dist-header {
  padding: 12px 16px;
  font-weight: 600;
  font-size: var(--fs-body);
  border-bottom: 0.5px solid var(--c-line);
}
.dist-group {
  padding: 12px 16px;
  border-bottom: 0.5px solid var(--c-line);
  cursor: pointer;
  user-select: none;
}
.dist-group:last-child { border-bottom: none; }
.dist-group-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.dist-cat-icon {
  width: 20px;
  height: 20px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
}
.dist-cat-icon.plant { background: var(--c-accent-lt); }
.dist-cat-icon.food { background: var(--c-warn-lt); }
.dist-cat-icon.fashion { background: var(--c-new-lt); }
.dist-cat-name { font-weight: 600; font-size: var(--fs-meta); }
.dist-cat-total { font-size: var(--fs-sm); color: var(--c-text-h); }
.dist-cat-arrow {
  margin-left: auto;
  font-size: 10px;
  color: var(--c-text-h);
  transition: transform 200ms;
  font-weight: 400;
}
.dist-group.open .dist-cat-arrow { transform: rotate(180deg); }

/* 堆叠条 */
.dist-bar-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.dist-bar-outer {
  flex: 1;
  height: 18px;
  background: var(--c-surf);
  border-radius: 3px;
  overflow: hidden;
  display: flex;
}
.dist-bar-push { background: var(--c-accent); transition: width 400ms; }
.dist-bar-filter { background: var(--c-done-lt); }
.dist-bar-label {
  font-size: var(--fs-sm);
  color: var(--c-text-s);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 10px;
}
.dist-bar-label span { white-space: nowrap; }
.dot-push {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--c-accent);
  margin-right: 2px;
}
.dot-filter {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--c-done);
  margin-right: 2px;
}

/* 子品类展开区 */
.dist-subs { display: none; margin-top: 10px; padding-top: 8px; border-top: 0.5px solid var(--c-line); }
.dist-group.open .dist-subs { display: block; }
.dist-sub-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
  font-size: var(--fs-sm);
}
.dist-sub-name {
  width: 68px;
  flex-shrink: 0;
  color: var(--c-text-s);
  text-align: right;
}
.dist-sub-bar-outer {
  flex: 1;
  height: 12px;
  background: var(--c-surf);
  border-radius: 2px;
  overflow: hidden;
  display: flex;
}
.dist-sub-bar-push { background: var(--c-accent); }
.dist-sub-bar-filter { background: var(--c-done-lt); }
.dist-sub-num {
  width: 28px;
  flex-shrink: 0;
  font-weight: 600;
  text-align: right;
  color: var(--c-text);
}

/* ===== 第三层：Tab 操作区 ===== */
.tabs {
  display: flex;
  margin: var(--sp-sec) var(--sp-card) 0;
  border-bottom: 2px solid var(--c-line);
  position: sticky;
  top: 0;
  z-index: 9;
  background: var(--c-surf);
}
.tab-btn {
  flex: 1;
  padding: 14px 6px;
  border: none;
  background: none;
  font-size: var(--fs-body);
  font-family: var(--font);
  font-weight: 500;
  color: var(--c-text-s);
  cursor: pointer;
  position: relative;
  min-height: 48px;
}
.tab-btn.active { color: var(--c-brand); }
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 15%;
  right: 15%;
  height: 3px;
  background: var(--c-brand);
  border-radius: 3px 3px 0 0;
}
.tab-count {
  display: inline-block;
  background: var(--c-line);
  color: var(--c-text-s);
  font-size: var(--fs-sm);
  padding: 1px 7px;
  border-radius: 10px;
  margin-left: 4px;
  font-weight: 400;
}
.tab-btn.active .tab-count { background: var(--c-brand); color: #fff; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* -- 主推Tab：产品卡片 -- */
.product-list { padding: 0 var(--sp-card); }
.cat-header {
  padding: 18px 0 8px;
  font-size: var(--fs-h2);
  font-weight: 600;
}
.card {
  background: #fff;
  border-radius: var(--r);
  margin-bottom: 10px;
  border: 0.5px solid var(--c-line);
  padding: var(--sp-card);
  position: relative;
  transition: all 200ms;
}
.card.done { background: var(--c-done-lt); }
.card.done .card-name,
.card.done .card-price { color: var(--c-done); }
.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
}
.card-name {
  font-size: var(--fs-h2);
  font-weight: 600;
  flex: 1;
  line-height: 1.35;
}
.card-price {
  font-size: 22px;
  font-weight: 700;
  white-space: nowrap;
}
.card-tags {
  margin-top: 6px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}
.tag {
  font-size: var(--fs-sm);
  padding: 3px 8px;
  border-radius: 4px;
  font-weight: 500;
}
.tag-star {
  color: var(--c-warn);
  font-size: var(--fs-meta);
  letter-spacing: 1px;
  padding: 0;
}
.tag-cm { background: var(--c-accent-lt); color: #3b6d11; }
.tag-new { background: var(--c-new-lt); color: var(--c-new); }
.tag-warn { background: var(--c-warn-lt); color: var(--c-warn); }
.tag-danger { background: var(--c-danger-lt); color: var(--c-danger); }
.card-copyline {
  margin-top: 6px;
  font-size: var(--fs-body);
  line-height: 1.5;
  color: var(--c-text);
  padding: 4px 0;
}
.card-info {
  margin-top: 6px;
  font-size: var(--fs-meta);
  color: var(--c-text-s);
}
.card-info span { margin-right: 12px; }
.card-care {
  margin-top: 8px;
  font-size: var(--fs-meta);
  color: var(--c-text-s);
  line-height: 1.6;
  background: var(--c-surf);
  padding: 10px 12px;
  border-radius: var(--r-sm);
}
.card-sup {
  margin-top: 4px;
  font-size: var(--fs-sm);
  color: var(--c-text-h);
}
.card-acts {
  margin-top: 12px;
  display: flex;
  gap: 10px;
}
.btn {
  flex: 1;
  padding: 14px 12px;
  border: none;
  border-radius: var(--r-sm);
  font-size: 16px;
  font-family: var(--font);
  font-weight: 600;
  cursor: pointer;
  min-height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all 150ms;
}
.btn:active { transform: scale(0.97); }
.btn-copy { background: var(--c-accent-lt); color: var(--c-accent); }
.btn-copy.copied { background: var(--c-accent); color: #fff; }
.btn-open { background: var(--c-brand); color: #fff; }
.btn-open.opened {
  background: var(--c-done-lt);
  color: var(--c-done);
}
.btn-sold-mark {
  position: absolute;
  top: -1px;
  left: -1px;
  width: 24px;
  height: 24px;
  min-height: 24px;
  flex: none;
  border: 1px solid var(--c-line);
  border-radius: 50%;
  background: #fff;
  color: var(--c-text-h);
  font-size: 11px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  transition: all 150ms;
  font-family: var(--font);
  z-index: 2;
}
.btn-sold-mark:active { transform: scale(0.9); }
.btn-sold-mark.sold-out-marked {
  background: var(--c-danger-lt);
  color: var(--c-danger);
  border-color: var(--c-danger);
}
.card.sold-out {
  opacity: 0.5;
  border-color: var(--c-danger);
}
.card.sold-out::after {
  content: "已售罄";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-15deg);
  font-size: 24px;
  font-weight: 700;
  color: var(--c-danger);
  opacity: 0.4;
  pointer-events: none;
}
.done-ribbon {
  position: absolute;
  top: 0;
  right: 0;
  background: var(--c-done);
  color: #fff;
  font-size: var(--fs-sm);
  padding: 4px 10px;
  border-radius: 0 var(--r) 0 var(--r-sm);
  font-weight: 500;
}

/* -- 预备役Tab -- */
.reserve-summary {
  padding: 12px var(--sp-card);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.reserve-stat {
  background: #fff;
  border-radius: var(--r-sm);
  padding: 10px 12px;
  border: 0.5px solid var(--c-line);
}
.reserve-stat .r-num { font-size: 20px; font-weight: 700; color: var(--c-warn); }
.reserve-stat .r-lbl { font-size: var(--fs-sm); color: var(--c-text-s); }
.reserve-hint {
  padding: 8px var(--sp-card);
  font-size: var(--fs-sm);
  color: var(--c-text-h);
}
.fp-card {
  margin: 0 var(--sp-card) 8px;
  border: 0.5px solid var(--c-warn);
  border-radius: var(--r-sm);
  padding: 12px 14px;
  background: #fffdf7;
  border-left: 3px solid var(--c-warn);
}
.fp-card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
}
.fp-card-name { font-size: var(--fs-body); font-weight: 600; }
.fp-card-price { font-size: 18px; font-weight: 700; white-space: nowrap; }
.fp-card-reason {
  font-size: var(--fs-sm);
  color: var(--c-warn);
  margin-top: 6px;
  line-height: 1.5;
  background: var(--c-warn-lt);
  padding: 6px 10px;
  border-radius: 4px;
}
.fp-card-meta { font-size: var(--fs-sm); color: var(--c-text-s); margin-top: 6px; }
.fp-card-meta span { margin-right: 12px; }
.fp-card-act { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
.reserve-all-toggle {
  text-align: center;
  padding: 14px;
  color: var(--c-text-h);
  font-size: var(--fs-sm);
  cursor: pointer;
  user-select: none;
}
.reserve-all-list { display: none; padding: 0 var(--sp-card) 12px; }
.reserve-all-list.show { display: block; }
.rg-title { font-size: var(--fs-meta); font-weight: 600; margin-bottom: 6px; }
.rg-title.plant { color: var(--c-accent); }
.rg-title.food { color: var(--c-warn); }
.rg-title.fashion { color: var(--c-new); }
.rg-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 10px;
}
.rg-tags span {
  font-size: var(--fs-sm);
  padding: 3px 8px;
  border-radius: 4px;
  background: var(--c-surf);
  color: var(--c-text-s);
  border: 0.5px solid var(--c-line);
}

/* 预备役 - 筛选按钮 */
.reserve-filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.rf-btn {
  font-size: var(--fs-sm);
  padding: 6px 12px;
  border-radius: 16px;
  border: 0.5px solid var(--c-line);
  background: #fff;
  color: var(--c-text-s);
  cursor: pointer;
  user-select: none;
  font-weight: 500;
}
.rf-btn.active { background: var(--c-brand); color: #fff; border-color: var(--c-brand); }

/* 预备役 - 产品卡片 */
.rcard {
  background: #fff;
  border-radius: var(--r-sm);
  padding: 12px 14px;
  margin-bottom: 8px;
  border: 0.5px solid var(--c-line);
}
.rcard-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
}
.rcard-name { font-size: var(--fs-meta); font-weight: 600; flex: 1; }
.rcard-price { font-size: 17px; font-weight: 700; white-space: nowrap; }
.rcard-reason {
  font-size: var(--fs-sm);
  color: var(--c-warn);
  margin-top: 4px;
  line-height: 1.5;
}
.rcard-meta { font-size: var(--fs-sm); color: var(--c-text-s); margin-top: 4px; }
.rcard-meta span { margin-right: 10px; }
.rcard-acts {
  margin-top: 8px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
}
.rcard-btn {
  padding: 8px 12px !important;
  font-size: var(--fs-sm) !important;
  min-height: 40px !important;
  flex: none !important;
}

/* ===== 校准台 ===== */
/* 手机端卡片视图 */
@media (max-width: 640px) {
  .cal-table-wrap { display: none; }
  .cal-card-view { display: block; padding: 0 var(--sp-card); }
}
@media (min-width: 641px) {
  .cal-card-view { display: none; }
  .cal-table-wrap { display: block; }
}

.cal-search {
  padding: 8px var(--sp-card);
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  border-bottom: 0.5px solid var(--c-line);
}
.cal-search input,
.cal-search select {
  padding: 10px 12px;
  border: 0.5px solid var(--c-line);
  border-radius: var(--r-sm);
  font-size: var(--fs-meta);
  font-family: var(--font);
  background: #fff;
  min-height: 44px;
}
.cal-search input { flex: 1; min-width: 100px; }
.cal-search input:focus { outline: none; border-color: var(--c-brand); }
.cal-check {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: var(--fs-sm);
  color: var(--c-text-s);
  white-space: nowrap;
  cursor: pointer;
}
.cal-check input { width: 15px; height: 15px; cursor: pointer; min-height: auto; }

.cal-legend {
  display: flex;
  gap: 16px;
  padding: 8px var(--sp-card);
  font-size: var(--fs-sm);
  color: var(--c-text-s);
  border-bottom: 0.5px solid var(--c-line);
}
.leg-dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-right: 4px;
}
.leg-passed { background: var(--c-accent); }
.leg-filtered { background: var(--c-done); }

.cal-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.cal-table {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--fs-sm);
  min-width: 800px;
}
.cal-table th {
  background: var(--c-surf);
  color: var(--c-text-s);
  font-weight: 600;
  padding: 10px 8px;
  text-align: left;
  white-space: nowrap;
  border-bottom: 1px solid var(--c-line);
  font-size: var(--fs-sm);
}
.cal-table td {
  padding: 10px 8px;
  border-bottom: 0.5px solid var(--c-line);
  color: var(--c-text);
  white-space: nowrap;
}
.cal-table tr:hover td { background: var(--c-surf); }
.cal-score { font-weight: 700; color: var(--c-brand); }
.cal-row-btn {
  padding: 4px 8px;
  font-size: var(--fs-sm);
  border: 0.5px solid var(--c-warn);
  background: var(--c-warn-lt);
  color: var(--c-warn);
  border-radius: 4px;
  cursor: pointer;
  white-space: nowrap;
  font-family: var(--font);
}
.cal-row-btn:hover { background: var(--c-warn); color: #fff; }
.cal-row-btn.marked { background: var(--c-warn); color: #fff; }
.cal-row-st { font-size: var(--fs-sm); color: var(--c-text-h); white-space: nowrap; }
.cal-name-link {
  color: var(--c-new);
  text-decoration: none;
  border-bottom: 1px dashed var(--c-new);
  transition: color 0.2s;
}
.cal-name-link:hover {
  color: var(--c-brand);
  border-bottom-color: var(--c-brand);
}
.status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; }
.status-dot.passed { background: var(--c-accent); }
.status-dot.filtered { background: var(--c-done); }

/* 校准台 - 手机端卡片 */
.cal-mcard {
  background: #fff;
  border-radius: var(--r-sm);
  padding: 12px 14px;
  margin-bottom: 8px;
  border: 0.5px solid var(--c-line);
}
.cal-mcard-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
}
.cal-mcard-name { font-size: var(--fs-meta); font-weight: 600; }
.cal-mcard-price { font-size: 17px; font-weight: 700; white-space: nowrap; }
.cal-mcard-scores {
  display: flex;
  gap: 12px;
  margin-top: 6px;
  font-size: var(--fs-sm);
  color: var(--c-text-s);
  flex-wrap: wrap;

<script>/**
 * 那与航 · 推品页面 JS v4 — 三层架构
 * PW / KEY 由页面 <script> 内联注入，push.js 从全局读取
 * 
 * 交互设计：
 *   - 密码 SHA-256 验证 + 7天免密
 *   - 品类分布互斥展开
 *   - Tab 切换 + 下划线指示
 *   - 复制话术（微信适配换行）+ 开团标记
 *   - 预备役筛选 + 校准台全量表 + 漏杀标记闭环
 */

// ===== Auth 7天有效期 =====
var AUTH_KEY = "push_auth";
var AUTH_EXPIRE_DAYS = 7;

(function initAuth() {
    var stored = localStorage.getItem(AUTH_KEY);
    if (stored) {
        try {
            var data = JSON.parse(stored);
            var now = Date.now();
            if (data.auth === "1" && data.expire > now) {
                show();
                return;
            }
        } catch (e) {}
    }
})();

function show() {
    document.getElementById("lock").style.display = "none";
    document.getElementById("main").style.display = "block";
    initProg();
}

function checkPw() {
    crypto.subtle.digest("SHA-256", new TextEncoder().encode(document.getElementById("pw").value)).then(function (b) {
        var h = Array.from(new Uint8Array(b)).map(function (x) { return x.toString(16).padStart(2, "0"); }).join("");
        if (h === PW) {
            var remember = document.getElementById("remember7");
            if (remember && remember.checked) {
                var expire = Date.now() + AUTH_EXPIRE_DAYS * 24 * 60 * 60 * 1000;
                localStorage.setItem(AUTH_KEY, JSON.stringify({ auth: "1", expire: expire }));
            }
            show();
        } else {
            document.getElementById("err").style.display = "block";
        }
    });
}

document.getElementById("pw").addEventListener("keydown", function (e) {
    if (e.key === "Enter") checkPw();
});

// ===== 进度恢复 =====
function initProg() {
    var d = JSON.parse(localStorage.getItem(KEY) || "[]");
    var l = localStorage.getItem(KEY + "_last") || "";
    d.forEach(function (i) {
        var e = document.getElementById("r" + i);
        if (e) {
            e.classList.add("done");
            addDoneRibbon(e);
        }
    });
    if (l) {
        var e = document.getElementById("r" + l);
        if (e) {
            setTimeout(function () { e.scrollIntoView({ block: "center", behavior: "smooth" }); }, 300);
        }
    }
    // 🔔 恢复标记漏杀状态
    restoreMarkedItems();
}

function restoreMarkedItems() {
    markedItems.forEach(function (item) {
        // 查找所有包含该名称的 cal-row-btn
        var btns = document.querySelectorAll(".cal-row-btn");
        btns.forEach(function (btn) {
            var onclick = btn.getAttribute("onclick") || "";
            if (onclick.indexOf(item.name) >= 0 && !btn.classList.contains("marked")) {
                btn.classList.add("marked");
                btn.textContent = "√ 已标记";
            }
        });
    });
    updateCalSummary();
    updateCalBadge();
}

function addDoneRibbon(card) {
    if (!card.querySelector(".done-ribbon")) {
        var r = document.createElement("div");
        r.className = "done-ribbon";
        r.textContent = "已处理";
        card.appendChild(r);

}

// ===== 品类分布互斥展开 =====

// ===== Tab 切换 =====
function switchTab(name) {
    document.querySelectorAll(".tab-btn").forEach(function (b) { b.classList.remove("active"); });
    document.querySelectorAll(".tab-content").forEach(function (t) { t.classList.remove("active"); });

    var map = { main: "主推", reserve: "预备役", calibrate: "校准台" };
    document.querySelectorAll(".tab-btn").forEach(function (b) {

// ============================================================
// 微信适配换行设计
// 设计原则：微信对话框输入框内，单 \n 行间距不明显
// → 层间用 \n\n 确保可见分段
// 园艺四前标注拆分为多行（封闭阳台/露台/花园/耐寒/怕热各一行）
// ============================================================
function formatForWechat(text) {
    if (!text) return "";
    var t = text.replace(/&#10;/g, "\n").replace(/\r\n/g, "\n").replace(/\r/g, "\n");
    t = t.replace(/^\n+/, "").replace(/\n+$/, "");
    var lines = t.split("\n").filter(function (l) { return l.trim(); });
    if (lines.length === 0) return "";

    // 第一行：标题+价格
    var result = lines[0];

    // 在剩余行中查找四问行（🧊/🏠/❄️ 开头），处理预售/标签等中间行
    var siqianIdx = -1;
    for (var i = 1; i < lines.length; i++) {
        if (lines[i].indexOf("🧊") >= 0 || lines[i].indexOf("🏠") >= 0) {
            siqianIdx = i;
            break;
        }
    }

    if (siqianIdx > 0) {
        // 四问之前的行（预售通知📦、种植者🏡等）
        for (var j = 1; j < siqianIdx; j++) {
            result += "\n" + lines[j];
        }
        // 四问行拆分 emoji 换行
        var careItems = lines[siqianIdx].split(" · ");
        result += "\n\n" + careItems.join("\n");
        // 四问之后的行
        for (var k = siqianIdx + 1; k < lines.length; k++) {
            result += "\n" + lines[k];
        }
    } else if (lines.length >= 2) {
        // 无四问行：剩余行原样追加（水果/穿搭/无KB植物）
        result += "\n\n" + lines.slice(1).join("\n");
    }

    return result.replace(/\n{3,}/g, "\n\n");
}

// ===== 复制到剪贴板（微信适配版） =====
function copyToClipboard(text, onSuccess, onError) {
    var formatted = formatForWechat(text);
    if (navigator.clipboard) {
        navigator.clipboard.writeText(formatted).then(onSuccess).catch(function () {
            fallbackCopy(formatted, onSuccess);
        });
    } else {
        fallbackCopy(formatted, onSuccess);
    }
}

function fallbackCopy(text, onSuccess) {
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    ta.style.top = "-9999px";
    document.body.appendChild(ta);
    ta.select();
    try {
        document.execCommand("copy");
        if (onSuccess) onSuccess();
    } catch (e) {
        toast("复制失败，请手动复制");
    }
    document.body.removeChild(ta);
}

// ===== 主推 Tab 卡片操作 =====
// 复制话术按钮
function doCopy(btn, cardId) {
    var card = document.getElementById(cardId);
    if (!card) return;
    var copyTxt = card.getAttribute("data-copy") || "";
    copyToClipboard(copyTxt, function () {
        btn.textContent = "已复制 ✓";
        btn.classList.add("copied");
        toast("已复制推品话术（微信适配换行）");
        setTimeout(function () {
            if (!card.classList.contains("done")) {
                btn.textContent = "复制话术";
                btn.classList.remove("copied");
            }
        }, 2000);
    });
}

// 开团按钮：复制 + 跳转 + 标记完成
function doOpen(btn, cardId) {
    var card = document.getElementById(cardId);
    if (!card) return;

    // 🔴 先打开链接（必须在用户点击同步上下文中）
    var link = card.getAttribute("data-link");
    if (link && link !== "#") {
        // 双重保险：window.open + a 标签兜底
        var w = window.open(link, "_blank");
        if (!w) {
            var a = document.createElement("a");
            a.href = link;
            a.target = "_blank";
            a.rel = "noopener";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    }

    // 如果已标记过 done，仅重新打开链接
    if (card.classList.contains("done")) {
        toast("已重新打开团链接");
        return;
    }

    // 标记完成
    var id = cardId.replace("r", "");
    var d = JSON.parse(localStorage.getItem(KEY) || "[]");
    if (d.indexOf(id) < 0) {
        d.push(id);
        localStorage.setItem(KEY, JSON.stringify(d));
    }
    localStorage.setItem(KEY + "_last", id);

    card.classList.add("done");
    addDoneRibbon(card);

    // 复制话术（异步，不阻塞链接跳转）
    var copyTxt = card.getAttribute("data-copy") || "";
    copyToClipboard(copyTxt, function () {
        toast("已复制话术 + 标记开团");
    });

    // 锁定按钮
    btn.textContent = "已开团 ✓";
    btn.classList.add("opened");
    var copyBtn = card.querySelector(".btn-copy");
    if (copyBtn && !copyBtn.classList.contains("copied")) {
        copyBtn.textContent = "已复制 ✓";
        copyBtn.classList.add("copied");
    }
}

// ===== 校准台 - 手机端卡片视图 =====
function buildCalCards() {
    var container = document.getElementById("calCardView");
    if (!container) return;
    var rows = document.querySelectorAll("#cal-tbody tr");
    var html = "";
    rows.forEach(function (tr) {
        if (tr.style.display === "none") return;
        var tds = tr.querySelectorAll("td");
        if (tds.length < 7) return;
        var name = tds[2].textContent;
        var calLink = tr.dataset.calLink || "";
        var cat = tds[3].textContent.trim();
        var score = tds[4].textContent;
        var cmScore = tds[5].textContent;
        var popScore = tds[6].textContent;
        var priceScore = tds[7].textContent;
        var isNew = tds[8].textContent !== "-" ? tds[8].textContent : "";
        var cm = tds[9].textContent;
        var price = tds[10].textContent;
        var help = tds[11].textContent;
        var supplier = tds[12].textContent;
        var actionCell = tds[1];
        var status = tr.dataset.status;
        var dotColor = status === "passed" ? "var(--c-accent)" : "var(--c-done)";

        html += '<div class="cal-mcard">' +
            '<div class="cal-mcard-top">' +
                '<span style="display:flex;align-items:center;gap:6px;flex:1;">' +
                    '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + dotColor + ';flex-shrink:0;"></span>' +
                    '<span class="cal-mcard-name">' + (calLink ? '<a href="' + calLink + '" target="_blank" rel="noopener" class="cal-name-link" onclick="event.stopPropagation()">' + name + '</a>' : name) + '</span>' +
                '</span>' +
                '<span class="cal-mcard-price">' + price + '</span>' +
            '</div>' +
            '<div class="cal-mcard-scores">' +
                '<span>总分 <b>' + score + '</b></span>' +
                '<span>佣金 <b>' + cmScore + '</b></span>' +
                '<span>人气 <b>' + popScore + '</b></span>' +
                '<span>价格 <b>' + priceScore + '</b></span>' +
                (isNew ? '<span style="color:var(--c-new)">新品 <b>' + isNew + '</b></span>' : '') +
            '</div>' +
            '<div class="cal-mcard-meta">' +
                '<span>' + cat + '</span>' +
                '<span>佣金 ' + cm + '</span>' +
                '<span>帮卖 ' + help + '</span>' +
                '<span>' + supplier + '</span>' +
            '</div>' +
            '<div class="cal-mcard-act">' + actionCell.innerHTML + '</div>' +
        '</div>';
    });
    container.innerHTML = html;
}

// ===== 校准台筛选 =====
function filterCal() {
    var q = (document.getElementById("cal-search-input") || {}).value || "";
    q = q.toLowerCase();
    var s = (document.getElementById("cal-status") || {}).value || "";
    var c = (document.getElementById("cal-cat") || {}).value || "";
    var n = (document.getElementById("cal-new") || {}).checked || false;
    var rows = document.querySelectorAll("#cal-tbody tr");
    rows.forEach(function (tr) {
        var search = (tr.dataset.search || "").toLowerCase();
        var rcat = tr.dataset.cat || "";
        var rstat = tr.dataset.status || "";
        var isNew = tr.dataset.new === "1";
        var match = (!q || search.indexOf(q) >= 0) && (!c || rcat === c) && (!s || rstat === s) && (!n || isNew);
        tr.style.display = match ? "" : "none";
    });
    buildCalCards();
}

// ===== 标记漏杀（持久化到 localStorage） =====
var MARKED_KEY = "push_marked_leaks";
var SOLD_OUT_KEY = "push_sold_out";
var markedItems = JSON.parse(localStorage.getItem(MARKED_KEY) || "[]");
var soldOutItems = JSON.parse(localStorage.getItem(SOLD_OUT_KEY) || "[]");

function doMark(btn, name, reason) {
    if (btn.classList.contains("marked")) {
        btn.classList.remove("marked");
        btn.textContent = "🔔 标记漏杀";
        markedItems = markedItems.filter(function (i) { return i.name !== name; });
    } else {
        btn.classList.add("marked");
        btn.textContent = "√ 已标记";
        markedItems.push({ name: name, reason: reason, time: new Date().toISOString() });
    }
    localStorage.setItem(MARKED_KEY, JSON.stringify(markedItems));
    updateCalSummary();
    updateCalBadge();
}

function updateCalSummary() {
    var empty = document.getElementById("calEmpty");
    var items = document.getElementById("calItems");
    var btn = document.getElementById("calApplyBtn");
    if (!items || !btn) return;

    if (markedItems.length === 0) {
        if (empty) empty.style.display = "block";
        items.innerHTML = "";
        btn.style.display = "none";
        return;
    }
    if (empty) empty.style.display = "none";

    var rc = {};
    markedItems.forEach(function (i) { rc[i.reason] = (rc[i.reason] || 0) + 1; });
    var html = "";
    var ruleMap = {
        "佣金低": '<span class="cal-sum-rule">commission_min 12%→10%</span>',
        "人气低": '<span class="cal-sum-rule">popularity_min 50→30</span>',
        "配额满": '<span class="cal-sum-rule">category_quota 放宽上限</span>',
        "被过滤": '<span class="cal-sum-rule">人工复审过滤逻辑</span>',
    };
    for (var r in rc) {
        var rule = ruleMap[r] || '<span class="cal-sum-rule">人工复审</span>';
        html += '<div class="cal-sum-item">' + rc[r] + ' 品因「' + r + '」被过滤 → ' + rule + '</div>';
    }
    html += '<div class="cal-sum-item" style="color:var(--c-text-s);margin-top:6px">已标记：' + markedItems.map(function (i) { return i.name; }).join("、") + '</div>';
    items.innerHTML = html;
    btn.style.display = "block";
}

// ===== 标记售罄 =====
function doSoldOut(btn, cardId) {
    var card = document.getElementById(cardId);
    if (!card) return;
    var name = (card.querySelector(".card-name") || {}).textContent || cardId;
    if (btn.classList.contains("sold-out-marked")) {
        btn.classList.remove("sold-out-marked");
        btn.textContent = "⚠️ 标记售罄";
        card.classList.remove("sold-out");
        soldOutItems = soldOutItems.filter(function (i) { return i.id !== cardId; });
    } else {
        btn.classList.add("sold-out-marked");
        btn.textContent = "已售罄";
        card.classList.add("sold-out");
        soldOutItems.push({ id: cardId, name: name, time: new Date().toISOString() });
    }
    localStorage.setItem(SOLD_OUT_KEY, JSON.stringify(soldOutItems));
    toast("售罄标记已保存，下次管线自动过滤");
}

function applyCal() {
    if (markedItems.length === 0) { toast("请先标记漏杀品"); return; }

    var byReason = {};
    markedItems.forEach(function (i) {
        if (!byReason[i.reason]) byReason[i.reason] = [];
        byReason[i.reason].push(i.name);
    });

    var ruleMap = {
        "佣金低": "commission_min 下调",
        "人气低": "popularity_min 下调",
        "配额满": "category_quota 放宽",
        "被过滤": "人工复审过滤逻辑",
    };

    var suggestions = [];
    for (var r in byReason) {
        suggestions.push({
            reason: r, count: byReason[r].length, products: byReason[r],
            rule_hint: ruleMap[r] || "人工复审"
        });
    }

    var report = {
        date: new Date().toISOString().split("T")[0],
        total_marked: markedItems.length,
        suggestions: suggestions
    };

    var prefix = "CALIBRATION_REPORT\n";
    var json = prefix + JSON.stringify(report, null, 2);

    // 复制到剪贴板
    if (navigator.clipboard) {
        navigator.clipboard.writeText(json).then(function () {
            toast("✅ 已复制！去微信粘贴给文件传输助手，再发给我");
        }).catch(function () {
            fallbackCopyText(json);
        });
    } else {
        fallbackCopyText(json);
    }

    clearAllMarks();

    // 弹窗预览
    var preview = suggestions.map(function (s) {
        return s.count + "品「" + s.reason + "」→ " + s.rule_hint + "\n  " + s.products.join("、");
    }).join("\n\n");
    alert("✅ 校准已复制\n\n" + preview + "\n\n📱 去微信 → 文件传输助手 → 粘贴发送 → 再到电脑微信复制发给我");
}

function fallbackCopyText(text) {
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.cssText = "position:fixed;left:-9999px";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    toast("✅ 已复制！去微信粘贴给文件传输助手");
}

// ===== Toast =====
function toast(msg) {
    var t = document.getElementById("toast");
    if (!t) return;
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(t._tid);
    t._tid = setTimeout(function () { t.classList.remove("show"); }, 1800);
}

// ===== 兼容旧版按钮（如果 template 中仍残留） =====
function goLast() {
    var l = localStorage.getItem(KEY + "_last") || "";
    var e = document.getElementById("r" + l);
    if (e) e.scrollIntoView({ behavior: "smooth", block: "center" });
    else toast("无上次位置记录");
}

function resetDone() {
    localStorage.removeItem(KEY);
    localStorage.removeItem(KEY + "_last");
    location.reload();
}</script>
